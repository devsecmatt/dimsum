{% extends "base.html" %}
{% block title %}Scan Detail{% endblock %}
{% block content %}
<div class="page-header"><h1>Scan {{ scan_id }}</h1></div>
<div class="card"><div class="card-body">
    <div id="scan-progress">
        <div class="progress-bar"><div class="progress-bar-fill" id="progress-bar" style="width: 0%"></div></div>
        <p id="progress-text">Loading...</p>
        <p>Status: <span id="scan-status">—</span></p>
    </div>
</div></div>
{% endblock %}
