{% extends "base.html" %}

{% block title %}New Project{% endblock %}

{% block content %}
<div class="page-header">
    <h1>New Project</h1>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('views_projects.create_project') }}">
            <div class="form-group">
                <label for="name">Project Name</label>
                <input type="text" id="name" name="name" required class="form-control"
                       placeholder="e.g., My Web App Security Audit">
            </div>
            <div class="form-group">
                <label for="description">Description (optional)</label>
                <textarea id="description" name="description" class="form-control" rows="3"
                          placeholder="Brief description of the project scope"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Create Project</button>
                <a href="{{ url_for('views_projects.list_projects') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
